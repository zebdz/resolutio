name: Deploy to Production

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    uses: ./.github/workflows/deploy.yml
    secrets: inherit
    with:
      branch: master
      deploy_dir: /var/www/www-root/data/www/resolutio.site
      site_url: https://resolutio.site
      port: '3000'
